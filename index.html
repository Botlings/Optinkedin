<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Optinkedin – Évaluez et optimisez votre profil LinkedIn par l'IA</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --blue-deep: #0a2540;
      --blue-mid: #0e6ffd;
      --blue-light: #3b9eff;
      --blue-glow: #5cb8ff;
      --accent: #00c6a2;
      --accent-light: #00e8bd;
      --bg: #f4f7ff;
      --bg-card: #ffffff;
      --text-main: #0a2540;
      --text-muted: #5a6a85;
      --border: rgba(10, 37, 64, 0.08);
      --radius: 14px;
      --shadow-card: 0 4px 24px rgba(10, 37, 64, 0.08);
      --shadow-hover: 0 12px 40px rgba(10, 37, 64, 0.16);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: var(--text-main);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ─── NAV ─── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 5%;
      background: rgba(244, 247, 255, 0.85);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--blue-deep);
      letter-spacing: -0.02em;
      text-decoration: none;
    }

    .nav-logo span {
      color: var(--blue-mid);
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--blue-mid);
      color: #fff;
      font-weight: 600;
      font-size: 0.9rem;
      padding: 10px 22px;
      border-radius: 50px;
      text-decoration: none;
      transition: background 0.25s, transform 0.2s, box-shadow 0.25s;
    }

    .nav-cta:hover {
      background: var(--blue-light);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(14, 111, 253, 0.35);
    }

    /* ─── HERO ─── */
    #hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 140px 5% 100px;
      background: linear-gradient(135deg, #0a2540 0%, #0e4a8a 40%, #0e6ffd 75%, #00c6a2 100%);
      position: relative;
      overflow: hidden;
    }

    #hero::before {
      content: '';
      position: absolute;
      width: 700px;
      height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(91,184,255,0.18) 0%, transparent 70%);
      top: -150px;
      right: -150px;
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,198,162,0.15) 0%, transparent 70%);
      bottom: -100px;
      left: -100px;
      pointer-events: none;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 7px 18px;
      border-radius: 50px;
      margin-bottom: 28px;
      backdrop-filter: blur(6px);
    }

    .hero-badge span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-light);
      display: inline-block;
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.4); }
    }

    .hero-headline {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2.4rem, 5.5vw, 3.8rem);
      font-weight: 700;
      color: #fff;
      line-height: 1.13;
      letter-spacing: -0.03em;
      max-width: 820px;
      margin-bottom: 22px;
    }

    .hero-headline .highlight {
      background: linear-gradient(90deg, var(--accent-light), var(--blue-glow));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: rgba(255,255,255,0.78);
      max-width: 560px;
      line-height: 1.65;
      margin-bottom: 42px;
      font-weight: 400;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      color: var(--blue-deep);
      font-weight: 700;
      font-size: 1rem;
      padding: 16px 36px;
      border-radius: 50px;
      text-decoration: none;
      transition: transform 0.22s, box-shadow 0.22s;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    }

    .btn-primary:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 16px 50px rgba(0,0,0,0.28);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-weight: 600;
      font-size: 1rem;
      padding: 16px 32px;
      border-radius: 50px;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(6px);
      transition: background 0.22s, transform 0.22s;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.22);
      transform: translateY(-2px);
    }

    .hero-score-preview {
      margin-top: 64px;
      position: relative;
      display: inline-block;
    }

    .score-card {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 28px 40px;
      display: flex;
      align-items: center;
      gap: 28px;
      text-align: left;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    .score-circle {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: conic-gradient(var(--accent-light) 0% 73%, rgba(255,255,255,0.15) 73% 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
    }

    .score-circle::before {
      content: '';
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: #0e4a8a;
      position: absolute;
    }

    .score-number {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      position: relative;
      z-index: 1;
    }

    .score-info p:first-child {
      color: rgba(255,255,255,0.6);
      font-size: 0.8rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }

    .score-info h3 {
      color: #fff;
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .score-info span {
      color: var(--accent-light);
      font-size: 0.85rem;
      font-weight: 600;
    }

    /* ─── SECTIONS COMMUNES ─── */
    section {
      padding: 100px 5%;
    }

    .section-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-block;
      background: rgba(14,111,253,0.08);
      color: var(--blue-mid);
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 6px 16px;
      border-radius: 50px;
      margin-bottom: 16px;
    }

    .section-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(1.8rem, 3.5vw, 2.6rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.2;
      color: var(--blue-deep);
      margin-bottom: 14px;
    }

    .section-sub {
      font-size: 1.05rem;
      color: var(--text-muted);
      max-width: 520px;
      line-height: 1.65;
    }

    /* ─── FEATURES ─── */
    #features {
      background: #fff;
    }

    .features-header {
      text-align: center;
      margin-bottom: 60px;
    }

    .features-header .section-sub {
      margin: 0 auto;
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
    }

    .feature-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      cursor: default;
    }

    .feature-card:hover {
      transform: translateY(-6px) scale(1.01);
      box-shadow: var(--shadow-hover);
      border-color: rgba(14,111,253,0.2);
    }

    .feature-icon {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(14,111,253,0.1), rgba(0,198,162,0.1));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      margin-bottom: 20px;
    }

    .feature-card h3 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--blue-deep);
      margin-bottom: 10px;
      letter-spacing: -0.01em;
    }

    .feature-card p {
      font-size: 0.93rem;
      color: var(--text-muted);
      line-height: 1.65;
    }

    /* ─── HOW IT WORKS ─── */
    #how {
      background: linear-gradient(180deg, #f4f7ff 0%, #eef3ff 100%);
    }

    .how-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
    }

    .steps-list {
      display: flex;
      flex-direction: column;
      gap: 36px;
      margin-top: 40px;
    }

    .step {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    .step-num {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--blue-mid), var(--blue-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 6px 20px rgba(14,111,253,0.3);
    }

    .step-content h4 {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--blue-deep);
      margin-bottom: 6px;
    }

    .step-content p {
      font-size: 0.92rem;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .how-visual {
      background: #fff;
      border-radius: 20px;
      padding: 36px;
      box-shadow: var(--shadow-card);
      border: 1px solid var(--border);
    }

    .visual-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .visual-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue-mid), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
    }

    .visual-name h5 {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--blue-deep);
    }

    .visual-name span {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .score-bar-wrap {
      margin-bottom: 16px;
    }

    .score-bar-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 7px;
    }

    .score-bar-label span:first-child {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-main);
    }

    .score-bar-label span:last-child {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--blue-mid);
    }

    .score-bar-bg {
      height: 8px;
      background: #eef3ff;
      border-radius: 50px;
      overflow: hidden;
    }

    .score-bar-fill {
      height: 100%;
      border-radius: 50px;
      background: linear-gradient(90deg, var(--blue-mid), var(--blue-light));
    }

    .score-bar-fill.green {
      background: linear-gradient(90deg, var(--accent), var(--accent-light));
    }

    .score-bar-fill.orange {
      background: linear-gradient(90deg, #f97316, #fb923c);
    }

    .total-score-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .total-score-row span {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    .total-score-val {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--blue-deep) !important;
    }

    .total-score-val em {
      font-size: 1rem;
      font-style: normal;
      color: var(--text-muted);
    }

    /* ─── PRICING / UNLOCK ─── */
    #pricing {
      background: #fff;
      text-align: center;
    }

    .pricing-card {
      max-width: 540px;
      margin: 50px auto 0;
      background: var(--bg);
      border: 2px solid var(--blue-mid);
      border-radius: 22px;
      padding: 48px 44px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 16px 60px rgba(14,111,253,0.12);
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .pricing-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 24px 80px rgba(14,111,253,0.2);
    }

    .pricing-badge {
      position: absolute;
      top: 20px;
      right: -28px;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 6px 44px;
      transform: rotate(45deg);
    }

    .pricing-name {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--blue-mid);
      margin-bottom: 8px;
    }

    .pricing-headline {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.7rem;
      font-weight: 700;
      color: var(--blue-deep);
      margin-bottom: 20px;
      letter-spacing: -0.02em;
    }

    .pricing-price {
      margin-bottom: 28px;
    }

    .price-amount {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 3.5rem;
      font-weight: 700;
      color: var(--blue-deep);
      letter-spacing: -0.04em;
    }

    .price-currency {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text-muted);
      vertical-align: top;
      margin-top: 10px;
      display: inline-block;
    }

    .price-note {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 6px;
    }

    .pricing-features {
      list-style: none;
      margin-bottom: 36px;
      text-align: left;
    }

    .pricing-features li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.93rem;
      color: var(--text-main);
      font-weight: 500;
    }

    .pricing-features li:last-child {
      border-bottom: none;
    }

    .check {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      flex-shrink: 0;
      color: #fff;
    }

    .btn-unlock {
      display: block;
      width: 100%;
      background: linear-gradient(135deg, var(--blue-mid), var(--blue-light));
      color: #fff;
      font-weight: 700;
      font-size: 1.05rem;
      padding: 18px 32px;
      border-radius: 50px;
      text-decoration: none;
      transition: transform 0.22s, box-shadow 0.22s;
      box-shadow: 0 8px 30px rgba(14,111,253,0.35);
    }

    .btn-unlock:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 16px 50px rgba(14,111,253,0.45);
    }

    .free-note {
      margin-top: 16px;
      font-size: 0.83rem;
      color: var(--text-muted);
    }

    /* ─── TESTIMONIALS ─── */
    #testimonials {
      background: linear-gradient(180deg, #eef3ff 0%, #f4f7ff 100%);
    }

    .testimonials-header {
      text-align: center;
      margin-bottom: 52px;
    }

    .testimonials-header .section-sub {
      margin: 0 auto;
    }

    .testimonials-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .testi-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 30px 28px;
      box-shadow: var(--shadow-card);
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .testi-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-hover);
    }

    .stars {
      color: #f59e0b;
      font-size: 0.95rem;
      margin-bottom: 14px;
      letter-spacing: 2px;
    }

    .testi-text {
      font-size: 0.93rem;
      color: var(--text-main);
      line-height: 1.7;
      margin-bottom: 22px;
      font-style: italic;
    }

    .testi-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .testi-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .testi-avatar.a1 { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
    .testi-avatar.a2 { background: linear-gradient(135deg, #f97316, #fb923c); }
    .testi-avatar.a3 { background: linear-gradient(135deg, var(--accent), var(--accent-light)); }

    .testi-meta span:first-child {
      display: block;
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--blue-deep);
    }

    .testi-meta span:last-child {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .stats-row {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
      justify-content: center;
      margin-top: 60px;
      padding-top: 48px;
      border-top: 1px solid var(--border);
    }

    .stat-item {
      text-align: center;
    }

    .stat-num {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.4rem;
      font-weight: 700;
      color: var(--blue-deep);
      letter-spacing: -0.04em;
    }

    .stat-num span {
      color: var(--blue-mid);
    }

    .stat-label {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 500;
      margin-top: 4px;
    }

    /* ─── CTA FINAL ─── */
    #cta-final {
      background: linear-gradient(135deg, #0a2540 0%, #0e4a8a 50%, #0e6ffd 100%);
      text-align: center;
      padding: 100px 5%;
    }

    .cta-final-inner {
      max-width: 680px;
      margin: 0 auto;
    }

    #cta-final .section-tag {
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.9);
    }

    #cta-final .section-title {
      color: #fff;
    }

    #cta-final .section-sub {
      color: rgba(255,255,255,0.7);
      max-width: 480px;
      margin: 0 auto 40px;
    }

    .cta-final-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
    }

    .btn-cta-white {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      color: var(--blue-deep);
      font-weight: 700;
      font-size: 1rem;
      padding: 16px 38px;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 8px 30px rgba(0,0,0,0.18);
      transition: transform 0.22s, box-shadow 0.22s;
    }

    .btn-cta-white:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 16px 50px rgba(0,0,0,0.28);
    }

    .guarantee {
      margin-top: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: rgba(255,255,255,0.6);
      font-size: 0.84rem;
    }

    /* ─── FOOTER ─── */
    footer {
      background: var(--blue-deep);
      padding: 36px 5%;
    }

    .footer-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
